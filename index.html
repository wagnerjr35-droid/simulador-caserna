<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Caserna Digital – Simulador PMMG / CBMMG</title>

<style>

body{
font-family:Courier New;
background:#f0f2f5;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:6px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input,select{
width:100%;
padding:6px;
margin-top:4px;
}

button{
margin-top:15px;
padding:10px;
width:100%;
background:#1e3a5f;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#294f82;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
font-size:14px;
}

th{
background:#e5e5e5;
border:1px solid #ccc;
padding:6px;
}

td{
border:1px solid #ccc;
padding:6px;
}

.total{
font-weight:bold;
background:#f4f4f4;
}

.liquido{
margin-top:15px;
font-size:20px;
font-weight:bold;
text-align:center;
}

.reajusteBox{
background:#fff7cc;
border:2px solid #d4b000;
padding:10px;
margin-top:12px;
border-radius:6px;
}

.reajusteTitulo{
font-weight:bold;
color:#8a6d00;
font-size:16px;
margin-bottom:6px;
}

</style>
</head>

<body>

<div class="container">

<h2>DEMONSTRATIVO DE PAGAMENTO - SIMULAÇÃO</h2>

<label>Posto / Graduação</label>

<div class="reajusteBox">

<label class="reajusteTitulo">REAJUSTE SALARIAL</label>

<label>
<input type="checkbox" id="reajuste54">
Aplicar reajuste automático de 5,4%
</label>

<label>Outro reajuste (%)</label>
<input type="number" id="reajusteManual" value="0">

</div>

<select id="posto">
<option value="" selected disabled>Selecione</option>
<option value="4562.30">Soldado 2ª Classe</option>
<option value="5332.60">Soldado 1ª Classe</option>
<option value="6171.73">Cabo</option>
<option value="7120.70">3º Sargento</option>
<option value="8069.71">2º Sargento</option>
<option value="9244.31">1º Sargento</option>
<option value="10372.43">Subtenente</option>
<option value="11547.06">2º Tenente</option>
<option value="13591.04">1º Tenente</option>
<option value="15276.62">Capitão</option>
<option value="17022.00">Major</option>
<option value="18812.00">Tenente-Coronel</option>
<option value="20487.00">Coronel</option>
</select>

<label>ADE (%)</label>
<input type="number" id="ade" value="0">

<label>Quinquênios</label>
<input type="number" id="qq" value="0">

<label>Trintenário</label>
<input type="checkbox" id="trint">

<label>Dependentes IR</label>
<input type="number" id="dep" value="0">

<label>Abono permanência</label>
<input type="checkbox" id="abono">

<label>Abono férias</label>
<input type="checkbox" id="ferias">

<label>Auxílio alimentação</label>
<input type="number" id="alim" value="1650">

<label>Abono fardamento</label>
<input type="number" id="fard" value="2133.05">

<label>Desconto alimentação</label>
<input type="number" id="descAlim" value="0">

<label>Consignações</label>
<input type="number" id="assoc" value="0">

<button onclick="simular()">Calcular Contracheque</button>

<div id="resultado"></div>

</div>

<script>

function arred(v){
return Math.round((v + Number.EPSILON) * 100) / 100
}

function simular(){

let base = parseFloat(document.getElementById("posto").value)

if(!base){
alert("Selecione o posto ou graduação")
return
}

let reajuste54 = document.getElementById("reajuste54").checked
let reajusteManual = parseFloat(document.getElementById("reajusteManual").value) || 0

if(reajuste54){
base = base * 1.054
}

if(reajusteManual > 0){
base = base * (1 + reajusteManual/100)
}

base = arred(base)

let qq = parseInt(document.getElementById("qq").value) || 0
let ade = parseFloat(document.getElementById("ade").value) || 0
let trint = document.getElementById("trint").checked
let dep = parseInt(document.getElementById("dep").value) || 0

let abono = document.getElementById("abono").checked
let ferias = document.getElementById("ferias").checked

let alim = parseFloat(document.getElementById("alim").value) || 0
let fard = parseFloat(document.getElementById("fard").value) || 0

let descAlim = parseFloat(document.getElementById("descAlim").value) || 0
let assoc = parseFloat(document.getElementById("assoc").value) || 0

let quinquenio = base * (qq * 0.10)
let adeValor = base * (ade/100)

let adicional = adeValor > 0 ? adeValor : quinquenio

let trinten = trint ? base * 0.10 : 0

let remuneracao = base + adicional + trinten

let abonoP = abono ? adicional : 0

let abonoF = ferias ? remuneracao / 3 : 0

let basePrev = base + adicional + trinten

let previdencia = arred(basePrev * 0.08)

let fundo = arred(basePrev * 0.035)

let baseIR =
(base + adicional + trinten + abonoP)
- previdencia
- fundo
- (dep * 189.59)

let ir = arred(calcularIR(baseIR))

let proventos =
remuneracao
+ abonoP
+ abonoF
+ alim
+ fard

let descontos =
previdencia
+ fundo
+ ir
+ descAlim
+ assoc

let liquido = arred(proventos - descontos)

document.getElementById("resultado").innerHTML =

`<table>

<tr>
<th>CÓD</th>
<th>DESCRIÇÃO</th>
<th>VANTAGENS</th>
<th>DESCONTOS</th>
</tr>

<tr>
<td>0001</td>
<td>REMUNERAÇÃO BÁSICA</td>
<td>${base.toFixed(2)}</td>
<td></td>
</tr>

<tr>
<td>0002</td>
<td>QUINQUÊNIO / ADE</td>
<td>${adicional.toFixed(2)}</td>
<td></td>
</tr>

<tr>
<td>0030</td>
<td>CONTRIBUIÇÃO PREVIDENCIÁRIA</td>
<td></td>
<td>${previdencia.toFixed(2)}</td>
</tr>

<tr>
<td>0210</td>
<td>FUNDO APOSENTADORIA</td>
<td></td>
<td>${fundo.toFixed(2)}</td>
</tr>

<tr>
<td>0199</td>
<td>IMPOSTO DE RENDA</td>
<td></td>
<td>${ir.toFixed(2)}</td>
</tr>

<tr class="total">
<td colspan="2">TOTAL</td>
<td>${proventos.toFixed(2)}</td>
<td>${descontos.toFixed(2)}</td>
</tr>

</table>

<div class="liquido">
LÍQUIDO: R$ ${liquido.toFixed(2)}
</div>`
}

function calcularIR(base){

if(base <= 2428.80) return 0
if(base <= 2826.65) return base*0.075 - 182.16
if(base <= 3751.05) return base*0.15 - 394.16
if(base <= 4664.68) return base*0.225 - 675.49

let valor = base*0.275 - 908.73

if(valor < 0) return 0

return valor
}

</script>

</body>
</html>
